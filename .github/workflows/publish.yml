name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install build twine
    - run: python -m build
    - run: twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}
