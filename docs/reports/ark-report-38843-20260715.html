<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK 诊断报告 | Issue #38843</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <style>
        body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .report-card { background: linear-gradient(135deg, #111118 0%, #16162a 100%); border: 1px solid #2a2a3e; border-radius: 16px; }
        .score-bar { height: 8px; border-radius: 4px; background: #2a2a3e; overflow: hidden; }
        .score-fill { height: 100%; border-radius: 4px; transition: width 1s ease-in-out; }
        .severity-high { border-left: 4px solid #ef4444; }
        .severity-medium { border-left: 4px solid #eab308; }
        .severity-low { border-left: 4px solid #22c55e; }
        .code-block { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 8px; padding: 12px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; overflow-x: auto; }
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
        @media (max-width: 640px) { .container { padding: 12px; } }
    </style>
</head>
<body>

<div class="container mx-auto max-w-4xl px-4 py-6">

    <!-- ====== 页眉 ====== -->
    <div class="text-center mb-6">
        <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-blue-400 via-cyan-400 to-purple-500 bg-clip-text text-transparent">
            🛡️ ARK 智能体诊断报告
        </h1>
        <p class="text-sm text-slate-500 mt-1">Agent Reliability Kit · 智能体健康感知系统</p>
    </div>

    <!-- ====== 区块1：问题摘要 ====== -->
    <div class="report-card p-4 md:p-6 mb-4">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-lg">📋</span>
            <h2 class="text-lg font-semibold text-white">问题摘要</h2>
        </div>
        <div id="block-summary">
            <div class="flex items-start gap-2 mb-2">
                <span id="severity-icon" class="text-xl">🔴</span>
                <div>
                    <p id="summary-text" class="text-base text-slate-200">加载中...</p>
                    <span id="severity-tag" class="badge mt-1 bg-red-500/20 text-red-400">严重</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== 区块2：根因定位 ====== -->
    <div class="report-card p-4 md:p-6 mb-4">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-lg">🔍</span>
            <h2 class="text-lg font-semibold text-white">根因定位</h2>
        </div>
        <div id="block-root-cause">
            <p class="text-sm text-slate-300 leading-relaxed">加载中...</p>
        </div>
    </div>

    <!-- ====== 区块3：关键证据 ====== -->
    <div class="report-card p-4 md:p-6 mb-4">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-lg">📊</span>
            <h2 class="text-lg font-semibold text-white">关键证据</h2>
        </div>
        <div id="block-evidence">
            <div class="space-y-3">
                <div>
                    <p class="text-xs text-slate-500 mb-1">📄 日志节选</p>
                    <div id="log-snippet" class="code-block">
                        <pre class="text-slate-300">加载中...</pre>
                    </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <div class="bg-slate-800/50 rounded-lg p-3 text-center">
                        <p class="text-xs text-slate-500">Token 消耗</p>
                        <p id="token-total" class="text-lg font-bold text-cyan-400">—</p>
                    </div>
                    <div class="bg-slate-800/50 rounded-lg p-3 text-center">
                        <p class="text-xs text-slate-500">异常调用占比</p>
                        <p id="anomaly-rate" class="text-lg font-bold text-red-400">—</p>
                    </div>
                    <div class="bg-slate-800/50 rounded-lg p-3 text-center">
                        <p class="text-xs text-slate-500">重复执行次数</p>
                        <p id="retry-count" class="text-lg font-bold text-yellow-400">—</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== 区块4：修复建议 ====== -->
    <div class="report-card p-4 md:p-6 mb-4">
        <div class="flex items-center gap-2 mb-3">
            <span class="text-lg">🔧</span>
            <h2 class="text-lg font-semibold text-white">修复建议</h2>
        </div>
        <div id="block-fix">
            <div class="space-y-3">
                <div id="fix-items">
                    <div class="bg-green-500/5 border border-green-500/10 rounded-lg p-3">
                        <p class="text-sm text-slate-300 leading-relaxed">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== 区块5：健康得分 ====== -->
    <div class="report-card p-4 md:p-6 mb-4">
        <div class="flex items-center gap-2 mb-4">
            <span class="text-lg">📈</span>
            <h2 class="text-lg font-semibold text-white">健康得分</h2>
        </div>
        <div id="block-score">
            <div class="text-center mb-4">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full border-4 border-slate-700">
                    <span id="health-score" class="text-2xl font-bold text-white">--</span>
                </div>
            </div>
            <div class="space-y-2">
                <div>
                    <div class="flex justify-between text-xs text-slate-400 mb-1">
                        <span>稳定性</span><span id="stability-score" class="text-slate-300">--</span>
                    </div>
                    <div class="score-bar"><div id="stability-bar" class="score-fill bg-blue-500" style="width:0%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs text-slate-400 mb-1">
                        <span>效率</span><span id="efficiency-score" class="text-slate-300">--</span>
                    </div>
                    <div class="score-bar"><div id="efficiency-bar" class="score-fill bg-cyan-500" style="width:0%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-xs text-slate-400 mb-1">
                        <span>安全性</span><span id="safety-score" class="text-slate-300">--</span>
                    </div>
                    <div class="score-bar"><div id="safety-bar" class="score-fill bg-purple-500" style="width:0%"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== 页脚反馈 ====== -->
    <div class="text-center pt-4 pb-2">
        <p class="text-xs text-slate-600">
            本报告由 <span class="text-cyan-500">ARK</span> 生成 —— 智能体健康感知系统<br>
            反馈：<a href="mailto:guanyi2026@agent.qq.com" class="text-blue-400 hover:text-blue-300">guanyi2026@agent.qq.com</a>
        </p>
    </div>

</div>

<script>
// 报告模板数据接口 — 使用前替换此数据块
// 每份报告只需修改 REPORT_DATA 对象
const REPORT_DATA = {
    severity: "high",
    severityLabel: "严重",
    summary: "Agent启用thinking模式后陷入无限推理循环，重复生成相同tool call",
    rootCause: "根因：`max_tokens`未显式指定 + `thinking_budget: 4096`搭配极低位。当enable_thinking=true时，ChatOpenAI的`max_tokens`默认值为256-512。thinking_budget=4096消费了几乎所有token预算，留给响应输出的token趋近于0。模型刚输出推理开头（'I will...'）就被截断，截断内容被当作完整输出返回 → Agent用截断输出发起下一次调用 → 再次截断 → 形成无限循环。本问题属于'静默Token饥饿'模式——配置表面上正确，实际token分配逻辑导致输出被截断。",
    logSnippet: `[Agent 循环输出节选 — 手动中断前持续重复]
I will generate the tool call.
The tool call is createDocx.
I will ensure the response is in Chinese.
I will ensure the response is helpful.
I will ensure the response is accurate.
Let's do it.
[重复×N，无工具调用实际执行]
...直至手动中断

▸ 推理token耗尽点：thinking_budget=4096（约3000 tokens用于推理）
▸ 输出截断点：max_tokens未设置 → 默认256 tokens
▸ 每次循环生成字符数：~600 chars/cycle
▸ 预计每分钟循环：~30次`,
    tokenTotal: "预估 >5万/分钟",
    anomalyRate: "100%（所有输出均为未完成的推理片段）",
    retryCount: "持续循环至手动中断",
    fixes: [
        {
            title: "显式设置max_tokens为足够值（关键修复）",
            code: `model = ChatOpenAI(
    base_url=model.base_url,
    api_key=SecretStr(model.api_key.strip()),
    model=model.name,
    temperature=model.temperature,
    max_tokens=8192,           # ← 必须显式设置！
    top_p=model.top_p,
    max_retries=2,
    extra_body={
        "enable_thinking": True,
        "chat_template_kwargs": {"enable_thinking": True},
        "thinking_budget": 4096
    },
)`,
            note: "max_tokens需≥ thinking_budget + 响应输出预算（建议=thinking_budget×2）。thinking_budget=4096时，max_tokens至少设为8192"
        },
        {
            title: "限制run_limit兜底循环次数（防御性修复）",
            code: `# 调整ModelCallLimitMiddleware的run_limit触发exit_behavior
# 当循环发生时，达到run_limit上限自动结束而非无限运行

middleware_list = [
    ModelCallLimitMiddleware(
        thread_limit=AGENT_THREAD_LIMIT,
        run_limit=50,              # 限制单次对话最多50轮
        exit_behavior="end",       # 超出后优雅结束
    ),
    # ... 其他中间件
]`,
            note: "防御性兜底。即使配置问题未排查到位，run_limit=50保底不会无限循环"
        }
    ],
    healthScore: 18,
    stability: 10,
    efficiency: 25,
    safety: 22
};

// ========== 渲染函数（不需要修改） ==========
function renderReport(data) {
    const isHigh = data.severity === 'high';
    const isMedium = data.severity === 'medium';

    // 区块1：摘要
    const icon = isHigh ? '🔴' : isMedium ? '🟡' : '🟢';
    const tagColor = isHigh ? 'bg-red-500/20 text-red-400' : isMedium ? 'bg-yellow-500/20 text-yellow-400' : 'bg-green-500/20 text-green-400';
    document.getElementById('severity-icon').textContent = icon;
    document.getElementById('summary-text').textContent = data.summary;
    const tag = document.getElementById('severity-tag');
    tag.textContent = data.severityLabel;
    tag.className = 'badge mt-1 ' + tagColor;

    // 区块2：根因
    document.querySelector('#block-root-cause p').textContent = data.rootCause;

    // 区块3：证据
    document.querySelector('#log-snippet pre').textContent = data.logSnippet;
    document.getElementById('token-total').textContent = data.tokenTotal;
    document.getElementById('anomaly-rate').textContent = data.anomalyRate;
    document.getElementById('retry-count').textContent = data.retryCount;

    // 区块4：修复
    const fixContainer = document.getElementById('fix-items');
    fixContainer.innerHTML = '';
    data.fixes.forEach(f => {
        const div = document.createElement('div');
        div.className = 'bg-green-500/5 border border-green-500/10 rounded-lg p-3';
        div.innerHTML = `<p class="text-sm font-medium text-green-400 mb-2">✅ ${f.title}</p>
<div class="code-block"><pre class="text-slate-300">${f.code}</pre></div>
<p class="text-xs text-slate-500 mt-2">💡 ${f.note}</p>`;
        fixContainer.appendChild(div);
    });

    // 区块5：得分
    const score = Math.max(0, Math.min(100, data.healthScore));
    document.getElementById('health-score').textContent = score;
    const borderColor = score >= 70 ? 'border-green-500' : score >= 40 ? 'border-yellow-500' : 'border-red-500';
    document.querySelector('#block-score .inline-flex').className = `inline-flex items-center justify-center w-20 h-20 rounded-full border-4 ${borderColor}`;
    document.getElementById('health-score').className = `text-2xl font-bold ${score >= 70 ? 'text-green-400' : score >= 40 ? 'text-yellow-400' : 'text-red-400'}`;

    // 各维度
    const dims = [
        { id: 'stability', val: data.stability, color: 'bg-blue-500' },
        { id: 'efficiency', val: data.efficiency, color: 'bg-cyan-500' },
        { id: 'safety', val: data.safety, color: 'bg-purple-500' }
    ];
    dims.forEach(d => {
        const v = Math.max(0, Math.min(100, d.val));
        document.getElementById(`${d.id}-score`).textContent = v;
        document.getElementById(`${d.id}-bar`).style.width = v + '%';
        document.getElementById(`${d.id}-bar`).className = `score-fill ${d.color}`;
    });
}

document.addEventListener('DOMContentLoaded', () => renderReport(REPORT_DATA));
</script>

</body>
</html>
