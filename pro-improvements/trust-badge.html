<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARK Pro — Trust Badge Component</title>
<style>
/* ===== Trust Badge — ARK Pro ===== */
.ark-trust-badge {
  max-width: 960px;
  margin: 48px auto;
  padding: 32px 40px;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  border: 1px solid rgba(99, 102, 241, 0.25);
  border-radius: 20px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
  box-shadow: 0 4px 32px rgba(99, 102, 241, 0.08);
}

.ark-trust-item {
  display: flex;
  align-items: center;
  gap: 14px;
  color: #e2e8f0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-width: 240px;
  flex: 1;
  justify-content: center;
}

.ark-trust-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.ark-trust-icon.globe   { background: rgba(59, 130, 246, 0.15); }
.ark-trust-icon.install { background: rgba(34, 197, 94, 0.15); }
.ark-trust-icon.shield  { background: rgba(239, 68, 68, 0.15); }

.ark-trust-icon svg { width: 22px; height: 22px; }

.ark-trust-label {
  font-size: 13px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 3px;
}
.ark-trust-value {
  font-size: 18px;
  font-weight: 700;
  color: #f1f5f9;
  line-height: 1.3;
}

@media (max-width: 768px) {
  .ark-trust-badge {
    flex-direction: column;
    padding: 28px 24px;
    gap: 20px;
  }
  .ark-trust-item { justify-content: flex-start; width: 100%; }
}
</style>
</head>
<body>

<!-- ===== Trust Badge Component ===== -->
<div class="ark-trust-badge">

  <!-- Data Point 1: Countries -->
  <div class="ark-trust-item">
    <div class="ark-trust-icon globe">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <ellipse cx="12" cy="12" rx="4" ry="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
      </svg>
    </div>
    <div>
      <div class="ark-trust-label">Trusted by developers from</div>
      <div class="ark-trust-value">84+ countries</div>
    </div>
  </div>

  <!-- Data Point 2: Installs -->
  <div class="ark-trust-item">
    <div class="ark-trust-icon install">
      <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 17 10 11 14 15 20 9"/>
        <polyline points="14 9 20 9 20 15"/>
      </svg>
    </div>
    <div>
      <div class="ark-trust-label">Monthly installs on PyPI</div>
      <div class="ark-trust-value">538+</div>
    </div>
  </div>

  <!-- Data Point 3: Safety -->
  <div class="ark-trust-item">
    <div class="ark-trust-icon shield">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 7v6c0 5.2 3.8 10 9 12 5.2-2 9-6.8 9-12V7l-9-5z"/>
      </svg>
    </div>
    <div>
      <div class="ark-trust-label">Automated tests, zero vulns</div>
      <div class="ark-trust-value">250+ tests · 0 known</div>
    </div>
  </div>

</div>

</body>
</html>
